namespace: mysql

image:
  repository: mysql
  tag: "8.0"

replicas: 2

secrets:
  MYSQL_ROOT_PASSWORD: "1234"
  MYSQL_USER: "app_user"
  MYSQL_PASSWORD: "1234"

pvc:
  storage: 2Gi

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "500m"
    memory: "1Gi"

affinity:
  key: app
  values:
    - mysql

tolerations:
  - key: "app"
    operator: "Equal"
    value: "mysql"
    effect: "NoSchedule"
